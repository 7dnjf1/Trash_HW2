name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache,mode=max

      - name: Pull latest image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
        shell: cmd

      - name: Stop and remove existing container (if exists)
        run: |
          docker stop waste-sorter-app || true
          docker rm waste-sorter-app || true
        continue-on-error: true
        shell: cmd

      - name: Run new container
        run: docker run -d --name waste-sorter-app -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
        shell: cmd

      - name: Health check container
        run: |
          Write-Host "Waiting for container to be ready..."
          $maxRetries = 15
          $retryCount = 0
          $success = $false
          while ($retryCount -lt $maxRetries) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8000/healthz" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed!"
                $success = $true
                break
              }
            } catch {
              Write-Host "Waiting... ($($retryCount + 1)/$maxRetries)"
            }
            $retryCount++
            Start-Sleep -Seconds 2
          }
          if (-not $success) {
            Write-Host "Health check failed after $maxRetries attempts."
            exit 1
          }
        shell: pwsh
