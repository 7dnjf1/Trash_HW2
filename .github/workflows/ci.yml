name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache,mode=max

      - name: Pull latest image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
        shell: cmd

      - name: Stop and remove existing container (if exists)
        run: |
          docker stop waste-sorter-app || true
          docker rm waste-sorter-app || true
        continue-on-error: true
        shell: cmd

      - name: Cleanup Port 8000 (Force)
        run: |
          echo Cleaning up port 8000...
          for /f "tokens=5" %%a in ('netstat -ano ^| findstr :8000') do (
            if not "%%a"=="0" (
              echo Killing process %%a
              taskkill /F /PID %%a
            )
          )
          ping 127.0.0.1 -n 3 >nul
        shell: cmd
        continue-on-error: true

      - name: Run new container
        run: docker run -d --name waste-sorter-app -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
        shell: cmd

      - name: Health check container
        run: |
          echo Waiting for AI model to load (Initial 10s)...
          ping 127.0.0.1 -n 11 >nul
          echo Starting health check loop (Max 2 minutes)...
          for /L %%i in (1,1,30) do (
            echo Attempt %%i/30 - Checking http://127.0.0.1:8000/healthz
            curl.exe -s http://127.0.0.1:8000/healthz | findstr "ok" >nul
            if not errorlevel 1 (
              echo [SUCCESS] Health check passed! Server is healthy.
              exit /b 0
            )
            echo [WAITING] Server not ready yet. Sleeping 4 seconds...
            ping 127.0.0.1 -n 5 >nul
          )
          echo [FAILURE] !!! Health check failed after 30 attempts !!!
          echo ---------------- DIAGNOSTICS ----------------
          echo Current Docker Containers:
          docker ps
          echo.
          echo Container Logs:
          docker logs waste-sorter-app
          echo ---------------------------------------------
          exit /b 1
        shell: cmd
