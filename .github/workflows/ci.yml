name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        
      - name: Log in to Docker Hub
        # 설정하신 GitHub Secrets (DOCKERHUB_USERNAME, DOCKERHUB_TOKEN) 활용
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 태그명은 [유저명]/[이미지이름]:latest 형태로 자동 매핑
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
          # 빌드 속도 단축을 위한 Docker 레이어 캐시 적용
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache,mode=max
