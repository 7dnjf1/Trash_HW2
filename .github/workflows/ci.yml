name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:buildcache,mode=max

      - name: Pull latest image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
        shell: cmd

      - name: Stop and remove existing container (if exists)
        run: |
          docker stop waste-sorter-app || true
          docker rm waste-sorter-app || true
        continue-on-error: true
        shell: cmd

      - name: Cleanup Port 8000 (Force)
        run: |
          $port = 8000
          $connections = Get-NetTCPConnection -LocalPort $port -ErrorAction SilentlyContinue
          if ($connections) {
            Write-Host "Found active connections on port $port. Terminating processes..."
            foreach ($c in $connections) {
              $pid = $c.OwningProcess
              if ($pid -gt 0) {
                Write-Host "Killing process $pid"
                Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
              }
            }
            Start-Sleep -Seconds 2
          }
        shell: powershell
        continue-on-error: true

      - name: Run new container
        run: docker run -d --name waste-sorter-app -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/waste-classifier-api:latest
        shell: cmd

      - name: Health check container
        run: |
          Write-Host "Waiting for AI model and server to be ready (Max 2 minutes)..."
          $maxRetries = 30
          $retryCount = 0
          $success = $false
          while ($retryCount -lt $maxRetries) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:8000/healthz" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed! Server is healthy."
                $success = $true
                break
              }
            } catch {
              $msg = $_.Exception.Message
              Write-Host "Attempt $($retryCount + 1)/$maxRetries - Waiting... ($msg)"
            }
            $retryCount++
            Start-Sleep -Seconds 4
          }
          if (-not $success) {
            Write-Host "!!! Health check failed after $maxRetries attempts !!!"
            Write-Host "Showing last 50 lines of container logs for diagnosis:"
            docker logs --tail 50 waste-sorter-app
            exit 1
          }
        shell: powershell
